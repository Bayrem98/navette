services:
  - type: web
    name: navette
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn transport_app.wsgi:application --workers=4 --threads=2 --timeout=60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: POSITIONSTACK_API_KEY
        value: 88bcabc4997f720becd5cb84b44c7b6e  # Mettez la valeur directement
      - key: DATABASE_URL
        fromDatabase:
          name: navette-db2
          property: connectionString
      - key: RENDER
        value: true
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SETTINGS_MODULE  # AJOUTEZ CETTE LIGNE
        value: transport_app.settings_production

databases:
  - name: navette-db2
    databaseName: navette-db2
    user: navette
    plan: free  # Spécifiez le plan