services:
  - type: web
    name: navette
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn transport_app.wsgi:application --workers=4 --threads=2 --timeout=60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: POSITIONSTACK_API_KEY
        sync: false  # You'll need to set this manually
      - key: DATABASE_URL
        fromDatabase:
          name: navette-db
          property: connectionString
      - key: RENDER
        value: true
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: navette-db
    databaseName: navette
    user: navette